<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>ERP AI 平台</title>
  <base href="/" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0f172a">
  
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <style>
    /* Critical for Single Page App Layout: No Global Scroll */
    html, body {
      height: 100%;
      width: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      /* Prevent pull-to-refresh on mobile to feel more like an app */
      overscroll-behavior-y: none; 
    }

    /* Custom scrollbar for a more modern look */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #f1f5f9;
    }
    ::-webkit-scrollbar-thumb {
      background: #94a3b8;
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #64748b;
    }

    /* Dark Mode Scrollbar */
    .dark ::-webkit-scrollbar-track {
      background: #0f172a; /* slate-900 */
    }
    .dark ::-webkit-scrollbar-thumb {
      background: #475569; /* slate-600 */
    }
    .dark ::-webkit-scrollbar-thumb:hover {
      background: #64748b; /* slate-500 */
    }
    
    /* Medium Theme (Eye Comfort/Sepia-ish) overrides */
    /* Handled via utility classes in Angular, but we set base here */
    body.theme-medium {
       background-color: #f5f5f4; /* Stone-100 */
       color: #292524; /* Stone-800 */
    }

    /* Resizable Column Styles */
    .resizer-handle {
      position: absolute;
      top: 0;
      bottom: 0;
      right: 0;
      width: 5px;
      cursor: col-resize;
      user-select: none;
      z-index: 10;
      transition: background-color 0.2s;
    }
    
    /* Show blue line on hover or dragging */
    .resizer-handle:hover, 
    .resizer-handle.resizing {
      background-color: #3b82f6; /* sky-500 */
    }
    
    .cursor-col-resize {
      cursor: col-resize !important;
    }

    /* Angular Global Validation Styles */
    input.ng-invalid.ng-touched, select.ng-invalid.ng-touched, textarea.ng-invalid.ng-touched {
        border-color: #ef4444; /* Tailwind red-500 */
        outline: none;
        box-shadow: 0 0 0 1px #ef4444;
    }
  </style>

</head>
<body class="bg-slate-50 antialiased font-sans transition-colors duration-300 dark:bg-slate-900 dark:text-slate-100">
  <app-root></app-root>
</body>
</html>
