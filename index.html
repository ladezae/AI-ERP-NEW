<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>ERP AI 平台</title>
  <base href="/" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0f172a">
  
  <link rel="icon" type="image/x-icon" href="favicon.ico" />

  <!-- Tailwind CSS: 使用 jsDelivr CDN 避免 MIME type 問題 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@3.4.0/base.css">
  <script>
    // Tailwind Play CDN fallback with config
    (function() {
      var script = document.createElement('script');
      script.src = 'https://cdn.tailwindcss.com';
      script.onload = function() {
        tailwind.config = {
          darkMode: 'class',
          theme: { extend: {} }
        };
      };
      document.head.appendChild(script);
    })();
  </script>

  <style>
    /* Critical for Single Page App Layout: No Global Scroll */
    html, body {
      height: 100%;
      width: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      overscroll-behavior-y: none; 
    }

    /* Custom scrollbar for a more modern look */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #f1f5f9;
    }
    ::-webkit-scrollbar-thumb {
      background: #94a3b8;
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #64748b;
    }

    /* Dark Mode Scrollbar */
    .dark ::-webkit-scrollbar-track {
      background: #0f172a;
    }
    .dark ::-webkit-scrollbar-thumb {
      background: #475569;
    }
    .dark ::-webkit-scrollbar-thumb:hover {
      background: #64748b;
    }
    
    /* Medium Theme */
    body.theme-medium {
       background-color: #f5f5f4;
       color: #292524;
    }

    /* Resizable Column Styles */
    .resizer-handle {
      position: absolute;
      top: 0;
      bottom: 0;
      right: 0;
      width: 5px;
      cursor: col-resize;
      user-select: none;
      z-index: 10;
      transition: background-color 0.2s;
    }
    
    .resizer-handle:hover, 
    .resizer-handle.resizing {
      background-color: #3b82f6;
    }
    
    .cursor-col-resize {
      cursor: col-resize !important;
    }

    /* Angular Global Validation Styles */
    input.ng-invalid.ng-touched,
    select.ng-invalid.ng-touched,
    textarea.ng-invalid.ng-touched {
        border-color: #ef4444;
        outline: none;
        box-shadow: 0 0 0 1px #ef4444;
    }
  </style>

<script type="importmap">
{
  "imports": {
    "rxjs": "https://esm.sh/rxjs@^7.8.2?conditions=es2015",
    "rxjs/operators": "https://esm.sh/rxjs@^7.8.2/operators?conditions=es2015",
    "rxjs/ajax": "https://esm.sh/rxjs@^7.8.2/ajax?conditions=es2015",
    "rxjs/webSocket": "https://esm.sh/rxjs@^7.8.2/webSocket?conditions=es2015",
    "rxjs/testing": "https://esm.sh/rxjs@^7.8.2/testing?conditions=es2015",
    "rxjs/fetch": "https://esm.sh/rxjs@^7.8.2/fetch?conditions=es2015",
    "@google/genai": "https://esm.sh/@google/genai@^1.35.0?external=rxjs",
    "@angular/forms": "https://esm.sh/@angular/forms@^21.0.8?external=rxjs",
    "@angular/common": "https://esm.sh/@angular/common@^21.0.8?external=rxjs",
    "@angular/common/http": "https://esm.sh/@angular/common@^21.0.8/http?external=rxjs",
    "@angular/compiler": "https://esm.sh/@angular/compiler@^21.0.8?external=rxjs",
    "@angular/platform-browser": "https://esm.sh/@angular/platform-browser@^21.0.8?external=rxjs",
    "@angular/core": "https://esm.sh/@angular/core@^21.0.8?external=rxjs",
    "firebase/app": "https://www.gstatic.com/firebasejs/10.13.1/firebase-app.js",
    "firebase/firestore": "https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore.js",
    "xlsx": "https://cdn.sheetjs.com/xlsx-0.20.3/package/xlsx.mjs",
    "jspdf": "https://esm.sh/jspdf@2.5.1",
    "html2canvas": "https://esm.sh/html2canvas@1.4.1",
    "d3": "https://esm.sh/d3@7.9.0",
    "@angular/common/": "https://esm.sh/@angular/common@^21.1.5/",
    "firebase/": "https://esm.sh/firebase@^12.9.0/"
  }
}
</script>

<link rel="stylesheet" href="/index.css">
</head>
<body class="bg-slate-50 antialiased font-sans transition-colors duration-300 dark:bg-slate-900 dark:text-slate-100">
